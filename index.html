<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMI ARGENTINA DATA - Dashboard</title>
    <!-- Carga de Tailwind CSS para el estilo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Íconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        /* Estilos específicos para la barra lateral y el contenido principal */
        .sidebar { min-height: 100vh; background-color: #1e3a8a; } /* Azul oscuro */
        .active-link { background-color: #3b82f6; color: white; border-radius: 0.5rem; }
        .data-card { transition: all 0.3s ease; }
        .data-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); }
        .btn-primary { transition: background-color 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

<div id="app" class="flex">
    <!-- BARRA LATERAL (Sidebar) -->
    <div class="sidebar w-64 p-5 flex flex-col justify-between text-white shadow-xl">
        <div>
            <h1 class="text-2xl font-bold mb-10 text-center tracking-wider">SMI ARGENTINA DATA</h1>
            <nav>
                <button onclick="navigate('general')" class="nav-link w-full flex items-center p-3 text-sm font-medium rounded-lg mb-2 transition duration-150 ease-in-out hover:bg-blue-500">
                    <span data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></span>
                    Resumen General
                </button>
                <button onclick="navigate('clientes')" class="nav-link w-full flex items-center p-3 text-sm font-medium rounded-lg mb-2 transition duration-150 ease-in-out hover:bg-blue-500">
                    <span data-lucide="users" class="w-5 h-5 mr-3"></span>
                    Clientes
                </button>
                <button onclick="navigate('documentos')" class="nav-link w-full flex items-center p-3 text-sm font-medium rounded-lg mb-2 transition duration-150 ease-in-out hover:bg-blue-500">
                    <span data-lucide="file-text" class="w-5 h-5 mr-3"></span>
                    Documentos y Vencimientos
                </button>
                <button onclick="navigate('servicios')" class="nav-link w-full flex items-center p-3 text-sm font-medium rounded-lg mb-2 transition duration-150 ease-in-out hover:bg-blue-500">
                    <span data-lucide="calendar-check" class="w-5 h-5 mr-3"></span>
                    Seguimiento de Servicios
                </button>
            </nav>
        </div>
        <div class="text-xs text-gray-400 p-2 border-t border-gray-700 mt-4">
            <p>Automatización de Gestión Empresarial</p>
            <p>ID de Sesión: <span id="session-id">Cargando...</span></p>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 p-8 overflow-y-auto">
        <div id="loading-indicator" class="hidden fixed inset-0 flex items-center justify-center bg-gray-200 bg-opacity-75 z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
            <p class="ml-4 text-lg font-semibold text-blue-700">Cargando...</p>
        </div>
        <div id="alert-container" class="fixed top-5 right-5 w-80 z-50"></div>

        <div id="content-area">
            <!-- Las vistas se inyectarán aquí -->
        </div>
    </main>
</div>

<!-- MODAL PARA AGREGAR CLIENTE -->
<div id="modal-cliente" class="modal-bg fixed inset-0 hidden items-center justify-center z-40">
    <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md">
        <h2 class="text-xl font-bold mb-4">Agregar Nuevo Cliente</h2>
        <form id="form-cliente">
            <div class="mb-4">
                <label for="cliente-nombre" class="block text-sm font-medium text-gray-700">Nombre o Razón Social</label>
                <input type="text" id="cliente-nombre" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-4">
                <label for="cliente-cuit" class="block text-sm font-medium text-gray-700">CUIT/Identificación</label>
                <input type="text" id="cliente-cuit" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-4">
                <label for="cliente-direccion" class="block text-sm font-medium text-gray-700">Dirección</label>
                <input type="text" id="cliente-direccion" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label for="cliente-telefono" class="block text-sm font-medium text-gray-700">Teléfono</label>
                <input type="tel" id="cliente-telefono" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" onclick="closeModal('modal-cliente')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Cancelar</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white btn-primary rounded-lg">Guardar Cliente</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    // =================================================================================
    // MIGRACIÓN A SUPABASE - PASO 2: CONEXIÓN
    //
    // ¡¡¡ ATENCIÓN !!!
    // DEBES REEMPLAZAR ESTAS DOS VARIABLES CON TUS CREDENCIALES REALES DE SUPABASE
    // (Settings > API en tu Dashboard de Supabase)
    // =================================================================================
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // 🚨 REEMPLAZA ESTO 🚨
    const SUPABASE_URL = 'TU_URL_DE_PROYECTO_SUPABASE'; // Ejemplo: 'https://abcdefg1234.supabase.co'
    const SUPABASE_ANON_KEY = 'TU_CLAVE_PUBLICA_ANON_SUPABASE'; // Ejemplo: 'eyJhbGciOiJIUzI1NiIsInR5c...'

    // Inicializar el cliente
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Variables de estado global
    let currentView = 'general';
    let db = supabase; // Alias para compatibilidad
    let userId = 'SMI-USER-PUBLIC-SESSION'; 
    window.clientes = [];
    window.documentos = [];
    window.servicios = [];
    let isInitialized = false;

    // =================================================================================
    // FUNCIONES DE UTILIDAD Y UI (Interacción)
    // =================================================================================

    function mostrarCargando(isVisible) {
        const indicator = document.getElementById('loading-indicator');
        if (indicator) {
            indicator.classList.toggle('hidden', !isVisible);
        }
    }

    function mostrarAlerta(message, type = 'success') {
        const container = document.getElementById('alert-container');
        if (!container) return;

        const baseClasses = 'p-4 mb-3 rounded-lg shadow-lg font-semibold';
        let typeClasses = '';

        if (type === 'success') {
            typeClasses = 'bg-green-100 text-green-700 border border-green-400';
        } else if (type === 'error') {
            typeClasses = 'bg-red-100 text-red-700 border border-red-400';
        } else if (type === 'info') {
            typeClasses = 'bg-blue-100 text-blue-700 border border-blue-400';
        }

        const alertDiv = document.createElement('div');
        alertDiv.className = `${baseClasses} ${typeClasses}`;
        alertDiv.textContent = message;

        container.appendChild(alertDiv);

        setTimeout(() => {
            alertDiv.remove();
        }, 5000);
    }

    function openModal(id) {
        document.getElementById(id)?.classList.remove('hidden');
        document.getElementById(id)?.classList.add('flex');
    }

    function closeModal(id) {
        document.getElementById(id)?.classList.add('hidden');
        document.getElementById(id)?.classList.remove('flex');
    }

    // =================================================================================
    // MIGRACIÓN A SUPABASE - PASO 3: LÓGICA DE DATOS
    // =================================================================================

    // Función genérica para obtener la colección (adaptada a Supabase)
    function getCollection(tableName) {
        return supabase.from(tableName);
    }
    
    // =========================================================
    // CRUD: CLIENTES
    // =========================================================

    /**
     * Reemplaza addDoc (Firebase) con insert (Supabase)
     */
    async function saveCliente(clienteData) {
        mostrarCargando(true);
        try {
            const { error } = await getCollection('clientes').insert([clienteData]);
            
            if (error) {
                console.error('Error Supabase al guardar cliente:', error);
                mostrarAlerta(`Error al guardar cliente: ${error.message}`, 'error');
                return false;
            }
            mostrarAlerta('Cliente guardado exitosamente.', 'success');
            closeModal('modal-cliente');
            return true;
        } catch (e) {
            console.error('Error de red/conexión al guardar cliente:', e);
            mostrarAlerta('Error de conexión al guardar cliente.', 'error');
            return false;
        } finally {
            mostrarCargando(false);
        }
    }
    
    /**
     * Reemplaza onSnapshot (Firebase) con select + realtime (Supabase)
     */
    function startClientesListener() {
        const fetchClientes = async () => {
            const { data, error } = await getCollection('clientes')
                .select('*')
                .order('nombre', { ascending: true });

            if (error) {
                console.error("Error al cargar clientes:", error);
                mostrarAlerta('No se pudieron cargar los clientes.', 'error');
                return;
            }

            window.clientes = data;
            // Solo renderiza si el usuario está en la vista de clientes
            if (currentView === 'clientes') {
                renderClientesList(data);
            }
        };

        // Llama a la función de carga inicial
        fetchClientes();

        // Configura el canal de escucha en tiempo real
        supabase
            .channel('clientes_realtime')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'clientes' },
                () => {
                    console.log('Cambio detectado en clientes. Refrescando lista...');
                    fetchClientes(); 
                }
            )
            .subscribe();
    }


    // =========================================================
    // CRUD: DOCUMENTOS
    // =========================================================
    
    /**
     * Reemplaza onSnapshot (Firebase) con select + realtime (Supabase)
     * Realiza un JOIN implícito para obtener el nombre del cliente
     */
    function startDocumentosListener() {
        const fetchDocumentos = async () => {
            const { data, error } = await getCollection('documentos')
                // Selecciona campos de documentos y el nombre del cliente (JOIN)
                .select(`*, clientes (nombre)`) 
                .order('fecha_vencimiento', { ascending: true }); 

            if (error) {
                console.error("Error al cargar documentos:", error);
                return;
            }

            const documentosData = data.map(doc => ({
                ...doc,
                cliente_nombre: doc.clientes ? doc.clientes.nombre : 'Cliente Desconocido'
            }));

            window.documentos = documentosData; 
            if (currentView === 'documentos') {
                renderDocumentosList(documentosData);
            }
        };

        fetchDocumentos();

        supabase
            .channel('documentos_realtime')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'documentos' },
                () => { fetchDocumentos(); }
            )
            .subscribe();
    }
    
    // (La función para GUARDAR DOCUMENTO sería similar a saveCliente, usando la tabla 'documentos')


    // =========================================================
    // CRUD: SERVICIOS
    // =========================================================

    /**
     * Reemplaza onSnapshot (Firebase) con select + realtime (Supabase)
     * Realiza un JOIN implícito para obtener el nombre del cliente
     */
    function startServiciosListener() {
        const fetchServicios = async () => {
            const { data, error } = await getCollection('servicios')
                // Selecciona campos de servicios y el nombre del cliente (JOIN)
                .select(`*, clientes (nombre)`)
                .order('fecha_fin_estimada', { ascending: true }); 

            if (error) {
                console.error("Error al cargar servicios:", error);
                return;
            }

            const serviciosData = data.map(doc => ({
                ...doc,
                cliente_nombre: doc.clientes ? doc.clientes.nombre : 'Cliente Desconocido'
            }));

            window.servicios = serviciosData; 
            if (currentView === 'servicios') {
                renderServiciosList(serviciosData);
            }
        };

        fetchServicios();

        supabase
            .channel('servicios_realtime')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'servicios' },
                () => { fetchServicios(); }
            )
            .subscribe();
    }
    
    // (La función para GUARDAR SERVICIO sería similar a saveCliente, usando la tabla 'servicios')


    // =================================================================================
    // VISTAS DEL DASHBOARD (Rendering)
    // =================================================================================

    // VISTA GENERAL
    function renderGeneralView() {
        const totalClientes = window.clientes.length;
        const docsVencidos = window.documentos.filter(d => new Date(d.fecha_vencimiento) < new Date()).length;
        const serviciosEnCurso = window.servicios.filter(s => s.estado === 'En Curso').length;

        document.getElementById('content-area').innerHTML = `
            <h2 class="text-3xl font-semibold text-gray-800 mb-6">Resumen General</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="data-card bg-white p-6 rounded-xl shadow-lg border-l-4 border-blue-500">
                    <p class="text-sm font-medium text-gray-500">Total Clientes</p>
                    <p class="text-3xl font-bold text-gray-900 mt-1">${totalClientes}</p>
                    <span class="text-xs text-blue-500 flex items-center mt-2"><span data-lucide="trending-up" class="w-4 h-4 mr-1"></span> Información actualizada</span>
                </div>
                <div class="data-card bg-white p-6 rounded-xl shadow-lg border-l-4 border-red-500">
                    <p class="text-sm font-medium text-gray-500">Documentos Vencidos</p>
                    <p class="text-3xl font-bold text-gray-900 mt-1">${docsVencidos}</p>
                    <span class="text-xs text-red-500 flex items-center mt-2"><span data-lucide="alert-triangle" class="w-4 h-4 mr-1"></span> Requiere acción inmediata</span>
                </div>
                <div class="data-card bg-white p-6 rounded-xl shadow-lg border-l-4 border-yellow-500">
                    <p class="text-sm font-medium text-gray-500">Servicios Activos</p>
                    <p class="text-3xl font-bold text-gray-900 mt-1">${serviciosEnCurso}</p>
                    <span class="text-xs text-yellow-500 flex items-center mt-2"><span data-lucide="refresh-cw" class="w-4 h-4 mr-1"></span> En seguimiento</span>
                </div>
            </div>

            <div class="mt-8 bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-semibold mb-4">Próximos Vencimientos (Top 5)</h3>
                ${renderVencimientosTable(window.documentos)}
            </div>
        `;
        lucide.createIcons();
    }
    
    function renderVencimientosTable(documentos) {
        const proximos = documentos
            .filter(d => new Date(d.fecha_vencimiento) >= new Date())
            .sort((a, b) => new Date(a.fecha_vencimiento) - new Date(b.fecha_vencimiento))
            .slice(0, 5);

        if (proximos.length === 0) return '<p class="text-gray-500">No hay documentos próximos a vencer.</p>';

        return `
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Documento</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vencimiento</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    ${proximos.map(doc => `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${doc.cliente_nombre || 'N/A'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${doc.nombre_documento}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">${new Date(doc.fecha_vencimiento).toLocaleDateString('es-AR')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    // VISTA CLIENTES
    function renderClientesView() {
        document.getElementById('content-area').innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold text-gray-800">Clientes Registrados</h2>
                <button onclick="openModal('modal-cliente')" class="px-4 py-2 bg-green-600 text-white rounded-lg btn-primary flex items-center shadow-md hover:bg-green-700">
                    <span data-lucide="plus" class="w-5 h-5 mr-2"></span>
                    Nuevo Cliente
                </button>
            </div>
            <div id="clientes-list-container" class="bg-white p-6 rounded-xl shadow-lg">
                ${renderClientesList(window.clientes)}
            </div>
        `;
        lucide.createIcons();
    }
    
    function renderClientesList(clientes) {
        if (clientes.length === 0) return '<p class="text-gray-500">No hay clientes registrados.</p>';

        return `
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">CUIT</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dirección</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    ${clientes.map(cliente => `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${cliente.nombre}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cliente.cuit}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${cliente.direccion || 'N/A'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <button class="text-blue-600 hover:text-blue-900" title="Ver Detalle"><span data-lucide="eye" class="w-5 h-5"></span></button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    // VISTA DOCUMENTOS
    function renderDocumentosView() {
        document.getElementById('content-area').innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold text-gray-800">Documentos y Vencimientos</h2>
                <button class="px-4 py-2 bg-green-600 text-white rounded-lg btn-primary flex items-center shadow-md hover:bg-green-700">
                    <span data-lucide="plus" class="w-5 h-5 mr-2"></span>
                    Nuevo Documento
                </button>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg">
                ${renderDocumentosList(window.documentos)}
            </div>
        `;
        lucide.createIcons();
    }
    
    function renderDocumentosList(documentos) {
        if (documentos.length === 0) return '<p class="text-gray-500">No hay documentos registrados.</p>';

        return `
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Documento</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vencimiento</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    ${documentos.map(doc => `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${doc.cliente_nombre || 'N/A'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${doc.nombre_documento}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">${new Date(doc.fecha_vencimiento).toLocaleDateString('es-AR')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${doc.estado === 'Vencido' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}">
                                    ${doc.estado}
                                </span>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    // VISTA SERVICIOS
    function renderServiciosView() {
        document.getElementById('content-area').innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold text-gray-800">Seguimiento de Servicios</h2>
                <button class="px-4 py-2 bg-green-600 text-white rounded-lg btn-primary flex items-center shadow-md hover:bg-green-700">
                    <span data-lucide="plus" class="w-5 h-5 mr-2"></span>
                    Nuevo Servicio
                </button>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-lg">
                ${renderServiciosList(window.servicios)}
            </div>
        `;
        lucide.createIcons();
    }
    
    function renderServiciosList(servicios) {
        if (servicios.length === 0) return '<p class="text-gray-500">No hay servicios en seguimiento.</p>';

        return `
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Servicio</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fin Estimado</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    ${servicios.map(s => `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${s.cliente_nombre || 'N/A'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${s.nombre_servicio}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">${new Date(s.fecha_fin_estimada).toLocaleDateString('es-AR')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${s.estado === 'En Curso' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'}">
                                    ${s.estado}
                                </span>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }


    // =================================================================================
    // NAVEGACIÓN Y MANEJO DE ESTADO
    // =================================================================================

    function navigate(view) {
        currentView = view;
        const links = document.querySelectorAll('.nav-link');
        links.forEach(link => {
            link.classList.remove('active-link');
            if (link.getAttribute('onclick').includes(view)) {
                link.classList.add('active-link');
            }
        });

        // Llama a la función de renderizado de la vista actual
        switch(view) {
            case 'general':
                renderGeneralView();
                break;
            case 'clientes':
                renderClientesView();
                break;
            case 'documentos':
                renderDocumentosView();
                break;
            case 'servicios':
                renderServiciosView();
                break;
        }
    }

    // MANEJO DEL FORMULARIO
    document.getElementById('form-cliente').addEventListener('submit', async (e) => {
        e.preventDefault();
        const clienteData = {
            nombre: document.getElementById('cliente-nombre').value,
            cuit: document.getElementById('cliente-cuit').value,
            direccion: document.getElementById('cliente-direccion').value,
            telefono: document.getElementById('cliente-telefono').value,
        };

        const success = await saveCliente(clienteData);
        if (success) {
            document.getElementById('form-cliente').reset();
        }
    });


    // =================================================================================
    // INICIO DE LA APLICACIÓN
    // =================================================================================

    window.onload = function() {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.includes('TU_')) {
            document.getElementById('content-area').innerHTML = `
                <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 rounded-md shadow-md" role="alert">
                    <p class="font-bold">⚠️ ¡Atención! Error de Conexión</p>
                    <p>Debes abrir el archivo <code>index.html</code> y reemplazar las variables <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code> con tus credenciales reales de Supabase.</p>
                </div>
            `;
            return;
        }

        // Mostrar el ID de sesión
        document.getElementById('session-id').textContent = userId;
        
        // Iniciar todos los listeners de datos migrados a Supabase
        startClientesListener();
        startDocumentosListener();
        startServiciosListener();
        
        // Renderizar la vista inicial
        navigate(currentView);
        isInitialized = true;
    }
</script>
</body>
</html>
