<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMI Argentina - Informes</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* =========================
   RESET
========================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

/* =========================
   CONTENEDOR
========================= */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* =========================
   HEADER
========================= */
.header {
  background: #0056b3;
  color: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* =========================
   SECCIONES
========================= */
.section {
  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 20px;
}

.section h3 {
  margin-top: 0;
  color: #0056b3;
  border-bottom: 1px solid #ddd;
  padding-bottom: 5px;
}

/* =========================
   GRID
========================= */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* =========================
   INPUTS
========================= */
input, textarea {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* =========================
   ESTADO
========================= */
.status button {
  margin: 5px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.active {
  background: #0056b3;
  color: white;
}

/* =========================
   IMAGENES
========================= */
.images {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.img-box {
  height: 120px;
  border: 2px dashed #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* =========================
   FIRMA
========================= */
canvas {
  border: 1px solid #ccc;
}

/* =========================
   BOTON
========================= */
.btn {
  width: 100%;
  padding: 15px;
  background: #0056b3;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useRef } = React;

function App() {

const canvasRef = useRef(null);

const [form, setForm] = useState({
  cliente:"",
  equipo:"",
  nroInforme:"",
  fecha:new Date().toISOString().split("T")[0],
  nroOrden:"",
  ubicacion:"",
  observaciones:"",
  estado:"APTO",
  aclaracion:""
});

const [images,setImages]=useState([]);

/* =========================
   HANDLERS
========================= */

const handleChange=e=>{
  setForm({...form,[e.target.name]:e.target.value});
};

const uploadImages=e=>{
  const files=Array.from(e.target.files);

  if(images.length + files.length > 4){
    alert("Maximo 4 imagenes");
    return;
  }

  files.forEach(f=>{
    const r=new FileReader();
    r.onloadend=()=>setImages(prev=>[...prev,r.result]);
    r.readAsDataURL(f);
  });
};

/* =========================
   FIRMA
========================= */

let drawing=false;

const start=e=>{
  const ctx=canvasRef.current.getContext("2d");
  ctx.beginPath();
  drawing=true;
};

const draw=e=>{
  if(!drawing)return;
  const rect=canvasRef.current.getBoundingClientRect();
  const ctx=canvasRef.current.getContext("2d");
  ctx.lineTo(e.clientX-rect.left,e.clientY-rect.top);
  ctx.stroke();
};

const stop=()=>drawing=false;

const clearSignature=()=>{
  const ctx=canvasRef.current.getContext("2d");
  ctx.clearRect(0,0,400,150);
};

/* =========================
   PDF PROFESIONAL
========================= */

const generatePDF=()=>{

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const pageWidth = doc.internal.pageSize.getWidth();
const margin = 15;
let y = 20;

const azul=[0,86,179];
const gris=[120,120,120];

doc.setFont("helvetica","bold");
doc.setFontSize(16);
doc.setTextColor(...azul);
doc.text("SMI Argentina",margin,y);

doc.setFontSize(9);
doc.setTextColor(0,0,0);
y+=6;
doc.text("Razon Social: Ruben Horacio Llorens",margin,y);
y+=4;
doc.text("CUIT: 20-22167232-2",margin,y);

y+=5;
doc.setDrawColor(...azul);
doc.line(margin,y,pageWidth-margin,y);

y+=12;
doc.setFontSize(18);
doc.text("INFORME FOTOGRAFICO",pageWidth/2,y,{align:"center"});

y+=10;
doc.rect(margin,y,pageWidth-(margin*2),15);

doc.text("Nro Informe: "+form.nroInforme,margin+5,y+6);
doc.text("Fecha: "+form.fecha,pageWidth/2,y+6);

y+=25;

doc.text("Cliente: "+form.cliente,margin,y);
y+=6;
doc.text("Equipo: "+form.equipo,margin,y);
y+=6;
doc.text("Ubicacion: "+form.ubicacion,margin,y);

y+=10;

doc.setTextColor(...azul);
doc.text("Estado: "+form.estado,margin,y);

y+=10;

images.forEach((img,i)=>{
  const row=Math.floor(i/2);
  const col=i%2;
  const x=margin + col*90;
  const yImg=y + row*70;
  doc.addImage(img,"JPEG",x,yImg,80,60);
  doc.rect(x,yImg,80,60);
});

y+=150;

doc.setTextColor(0,0,0);
doc.text("Observaciones:",margin,y);
y+=5;
doc.text(form.observaciones || "-",margin,y);

y+=20;

const sign=canvasRef.current.toDataURL("image/png");
doc.addImage(sign,"PNG",margin,y,60,25);

y+=30;
doc.text("Aclaracion: "+form.aclaracion,margin,y);

doc.save("Informe_"+form.nroInforme+".pdf");
};

/* =========================
   RENDER
========================= */

return(
<div className="container">

<div className="header">
<h2>SMI Argentina</h2>
<p>Informe Fotografico</p>
</div>

<div className="section">
<h3>Datos</h3>
<div className="grid">
<input name="cliente" placeholder="Cliente" onChange={handleChange}/>
<input name="equipo" placeholder="Equipo" onChange={handleChange}/>
<input name="nroInforme" placeholder="Nro Informe" onChange={handleChange}/>
<input type="date" name="fecha" onChange={handleChange}/>
<input name="nroOrden" placeholder="Nro Orden" onChange={handleChange}/>
<input name="ubicacion" placeholder="Ubicacion" onChange={handleChange}/>
</div>
</div>

<div className="section">
<h3>Estado</h3>
<div className="status">
{["APTO","APTO CON CONDICIONES","NO APTO"].map(s=>(
<button
key={s}
className={form.estado===s?"active":""}
onClick={()=>setForm({...form,estado:s})}
>{s}</button>
))}
</div>
</div>

<div className="section">
<h3>Imagenes</h3>
<input type="file" multiple onChange={uploadImages}/>
<div className="images">
{images.map((img,i)=>(
<div className="img-box">
<img src={img}/>
</div>
))}
</div>
</div>

<div className="section">
<h3>Observaciones</h3>
<textarea name="observaciones" onChange={handleChange}></textarea>
</div>

<div className="section">
<h3>Firma</h3>
<canvas
ref={canvasRef}
width={400}
height={150}
onMouseDown={start}
onMouseMove={draw}
onMouseUp={stop}
onMouseLeave={stop}
/>
<br/>
<button onClick={clearSignature}>Limpiar firma</button>
<input name="aclaracion" placeholder="Aclaracion" onChange={handleChange}/>
</div>

<button className="btn" onClick={generatePDF}>
GENERAR PDF
</button>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
