<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SMI Argentina - Informes</title>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    canvas {
      border: 1px solid #ccc;
    }

    button {
      background: #0056b3;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    img {
      margin: 5px;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useRef } = React;

function App() {

  const canvasRef = useRef(null);

  const [formData, setFormData] = useState({
    cliente: "",
    equipo: "",
    nroInforme: "",
    fecha: new Date().toISOString().split("T")[0],
    nroOrden: "",
    ubicacion: "",
    observaciones: "",
    estado: "APTO",
    aclaracion: ""
  });

  const [images, setImages] = useState([]);
  const [loading, setLoading] = useState(false);

  const handleChange = (e) => {
    setFormData({...formData, [e.target.name]: e.target.value});
  };

  const handleImages = (e) => {
    const files = Array.from(e.target.files);

    files.forEach(file => {
      const reader = new FileReader();
      reader.onloadend = () => {
        setImages(prev => [...prev, reader.result]);
      };
      reader.readAsDataURL(file);
    });
  };

  // FIRMA
  let drawing = false;

  const start = (e) => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.beginPath();
    drawing = true;
  };

  const draw = (e) => {
    if (!drawing) return;

    const rect = canvasRef.current.getBoundingClientRect();
    const ctx = canvasRef.current.getContext("2d");

    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.stroke();
  };

  const stop = () => drawing = false;

  const clear = () => {
    const ctx = canvasRef.current.getContext("2d");
    ctx.clearRect(0, 0, 400, 150);
  };

  // PDF
  const generatePDF = () => {

    if (!formData.cliente || !formData.equipo || !formData.nroInforme) {
      alert("Completar campos obligatorios");
      return;
    }

    setLoading(true);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    // HEADER
    doc.setFontSize(16);
    doc.text("SMI Argentina", 15, y);

    y += 6;
    doc.setFontSize(10);
    doc.text("Razon Social: Ruben Horacio Llorens", 15, y);
    y += 4;
    doc.text("CUIT: 20-22167232-2", 15, y);

    y += 10;
    doc.setFontSize(18);
    doc.text("INFORME FOTOGRAFICO", 105, y, { align: "center" });

    // DATOS
    y += 10;
    doc.setFontSize(10);
    doc.text("Cliente: " + formData.cliente, 15, y);
    y += 5;
    doc.text("Equipo: " + formData.equipo, 15, y);
    y += 5;
    doc.text("Fecha: " + formData.fecha, 15, y);

    // IMÁGENES
    y += 10;

    images.forEach((img, i) => {
      doc.addImage(img, "JPEG", 15, y, 80, 50);
      y += 55;
    });

    // OBS
    doc.text("Observaciones:", 15, y);
    y += 5;
    doc.text(formData.observaciones || "-", 15, y);

    // FIRMA
    y += 20;
    const signature = canvasRef.current.toDataURL("image/png");
    doc.addImage(signature, "PNG", 15, y, 60, 25);

    y += 30;
    doc.text("Aclaración: " + formData.aclaracion, 15, y);

    doc.save("Informe_" + formData.nroInforme + ".pdf");

    setLoading(false);
  };

  return (
    <div className="container">

      <h2>SMI Argentina</h2>

      <input name="cliente" placeholder="Cliente" onChange={handleChange} />
      <input name="equipo" placeholder="Equipo" onChange={handleChange} />
      <input name="nroInforme" placeholder="N° Informe" onChange={handleChange} />
      <input type="date" name="fecha" onChange={handleChange} />

      <input type="file" multiple onChange={handleImages} />

      <div>
        {images.map((img, i) => (
          <img key={i} src={img} width="100" />
        ))}
      </div>

      <textarea name="observaciones" placeholder="Observaciones" onChange={handleChange}></textarea>

      <h4>Firma</h4>
      <canvas
        ref={canvasRef}
        width={400}
        height={150}
        onMouseDown={start}
        onMouseMove={draw}
        onMouseUp={stop}
        onMouseLeave={stop}
      />

      <button onClick={clear}>Limpiar Firma</button>

      <input name="aclaracion" placeholder="Aclaración" onChange={handleChange} />

      <br/><br/>

      <button onClick={generatePDF}>
        {loading ? "Generando..." : "Generar PDF"}
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
