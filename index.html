<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SMI Argentina</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useRef, useEffect } = React;

const App = () => {

  const [formData, setFormData] = useState({
    cliente: '',
    equipo: '',
    nroInforme: '',
    fecha: new Date().toISOString().split('T')[0],
    nroOrden: '',
    ubicacion: '',
    observaciones: '',
    estado: 'APTO',
    aclaracion: ''
  });

  const [images, setImages] = useState([]);
  const [isGenerating, setIsGenerating] = useState(false);
  const [pdfLibReady, setPdfLibReady] = useState(false);

  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);

  useEffect(() => {
    setPdfLibReady(true);
  }, []);

  const colors = {
    primary: '#0056b3',
    secondary: '#6c757d',
    success: '#28a745',
    warning: '#ffc107',
    danger: '#dc3545',
    white: '#ffffff'
  };

  const handleInputChange = (e) => {
    const { name, value } = e.target;
    setFormData(prev => ({ ...prev, [name]: value }));
  };

  const handleImageUpload = (e) => {
    const files = Array.from(e.target.files);
    if (images.length + files.length > 4) {
      alert("Máximo 4 imágenes permitidas");
      return;
    }

    files.forEach(file => {
      const reader = new FileReader();
      reader.onloadend = () => {
        setImages(prev => [...prev, reader.result]);
      };
      reader.readAsDataURL(file);
    });
  };

  const removeImage = (index) => {
    setImages(prev => prev.filter((_, i) => i !== index));
  };

  const getCoordinates = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  };

  const startDrawing = (e) => {
    const coords = getCoordinates(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(coords.x, coords.y);
    setIsDrawing(true);
  };

  const draw = (e) => {
    if (!isDrawing) return;
    const coords = getCoordinates(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.lineTo(coords.x, coords.y);
    ctx.stroke();
  };

  const stopDrawing = () => setIsDrawing(false);

  const clearSignature = () => {
    const ctx = canvasRef.current.getContext('2d');
    ctx.clearRect(0, 0, 400, 150);
  };

  const generatePDF = () => {

    if (!pdfLibReady) return;

    if (!formData.cliente || !formData.equipo || !formData.nroInforme) {
      alert("Completar campos obligatorios");
      return;
    }

    setIsGenerating(true);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    doc.text("SMI Argentina", 15, y);
    y += 10;
    doc.text("INFORME FOTOGRAFICO", 105, y, { align: "center" });

    y += 10;
    doc.text("Cliente: " + formData.cliente, 15, y);
    y += 5;
    doc.text("Equipo: " + formData.equipo, 15, y);

    y += 10;

    images.forEach((img) => {
      doc.addImage(img, "JPEG", 15, y, 80, 50);
      y += 55;
    });

    const sign = canvasRef.current.toDataURL("image/png");
    doc.addImage(sign, "PNG", 15, y, 60, 25);

    doc.save("informe.pdf");
    setIsGenerating(false);
  };

  return (
    <div className="p-6 max-w-4xl mx-auto">

      <h1 className="text-2xl font-bold mb-4">SMI Argentina</h1>

      <input name="cliente" placeholder="Cliente" onChange={handleInputChange} className="border p-2 w-full mb-2"/>
      <input name="equipo" placeholder="Equipo" onChange={handleInputChange} className="border p-2 w-full mb-2"/>
      <input name="nroInforme" placeholder="Nro Informe" onChange={handleInputChange} className="border p-2 w-full mb-2"/>

      <input type="file" multiple onChange={handleImageUpload} />

      <div className="grid grid-cols-2 gap-2 mt-2">
        {images.map((img,i)=>(
          <img key={i} src={img} className="w-full h-32 object-cover"/>
        ))}
      </div>

      <textarea name="observaciones" onChange={handleInputChange} className="border w-full mt-4 p-2"/>

      <canvas
        ref={canvasRef}
        width={400}
        height={150}
        className="border mt-4"
        onMouseDown={startDrawing}
        onMouseMove={draw}
        onMouseUp={stopDrawing}
      />

      <button onClick={clearSignature} className="mt-2">Limpiar firma</button>

      <button onClick={generatePDF} className="bg-blue-600 text-white p-3 mt-4 w-full">
        Generar PDF
      </button>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
